<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuLens - 加密空間</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        .sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 50; }
        #camera-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 pb-64">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center fade-in">
            <div class="text-5xl mb-6">🔒</div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">私密點餐空間</h2>
            <p class="text-slate-400 text-sm mb-6">輸入 4 位數密碼以開啟或建立房間</p>
            <input type="number" id="pwd-input" pattern="\d*" inputmode="numeric" placeholder="例如 8888" 
                   class="w-full bg-slate-100 border-none rounded-2xl p-4 text-center font-bold text-3xl mb-4 outline-none focus:ring-4 focus:ring-blue-500/20 tracking-[1rem]">
            <button onclick="unlockApp()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all mb-4">解鎖 / 建立</button>
            <p class="text-[10px] text-slate-400">同伴輸入相同密碼即可加入您的房間</p>
        </div>
    </div>

    <div id="app-body" class="hidden">
        <header class="bg-white p-5 sticky top-0 z-40 border-b border-slate-100 shadow-sm flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">Menu<span class="text-blue-600">Lens</span></h1>
                <p id="room-display" class="text-[9px] text-slate-400 font-bold uppercase"></p>
            </div>
            <button onclick="logout()" class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-bold">登出/更換房間</button>
        </header>

        <div class="p-4">
            <div class="bg-blue-600 p-4 rounded-3xl text-white shadow-lg space-y-3 mb-4">
                <div class="flex justify-between items-center">
                    <select id="local-ccy" onchange="updateConfig()" class="bg-blue-700 text-white font-black p-2 rounded-xl outline-none">
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="KRW">🇰🇷 KRW</option>
                        <option value="THB">🇹🇭 THB</option>
                        <option value="EUR">🇪🇺 EUR</option>
                    </select>
                    <span class="opacity-50">➜</span>
                    <select id="home-ccy" onchange="updateConfig()" class="bg-blue-700 text-white font-black p-2 rounded-xl outline-none text-right">
                        <option value="TWD">🇹🇼 TWD</option>
                        <option value="HKD">🇭🇰 HKD</option>
                        <option value="USD">🇺🇸 USD</option>
                    </select>
                </div>
                <div class="flex justify-between items-center border-t border-blue-500 pt-2">
                    <span class="text-[10px] opacity-70">匯率: 1 <span class="local-code">JPY</span> =</span>
                    <div class="flex items-center space-x-2">
                        <input type="number" id="rate-display" step="0.0001" onchange="manualRate(this.value)" class="bg-blue-800 text-right font-mono text-sm px-2 rounded border-none w-24">
                        <span class="home-code text-[10px] opacity-70">TWD</span>
                    </div>
                </div>
            </div>

            <main id="item-list" class="space-y-3"></main>
        </div>

        <div class="sticky-bottom p-5 border-t border-slate-100 bg-white/80 backdrop-blur-md">
            <label for="camera-input" class="w-full bg-blue-600 text-white py-4 rounded-2xl flex items-center justify-center shadow-xl active:scale-95 transition-all mb-4 cursor-pointer">
                <span class="font-bold text-lg">📸 拍攝價格換算</span>
            </label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="processImage(this)">

            <div class="flex justify-between items-center bg-slate-900 text-white p-5 rounded-[2rem]">
                <div>
                    <span class="text-[9px] text-slate-500 font-bold uppercase local-code">JPY</span>
                    <p class="text-xl font-bold font-mono" id="total-local">0</p>
                </div>
                <div class="text-right border-l border-slate-800 pl-6">
                    <span class="text-[9px] text-blue-400 font-bold uppercase home-code">TWD</span>
                    <p class="text-3xl font-black font-mono text-blue-400" id="total-home">0</p>
                </div>
            </div>
            
            <div class="flex justify-between mt-3 px-2">
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="svc-toggle" onchange="toggleSvc()" class="w-4 h-4 rounded accent-blue-600">
                    <label for="svc-toggle" class="text-[10px] font-bold text-slate-400">10% 服務費</label>
                </div>
                <button onclick="clearAll()" class="text-[10px] font-bold text-red-400 uppercase">清空全部</button>
            </div>
        </div>
    </div>

    <div id="scan-overlay" class="hidden fixed inset-0 bg-black/80 z-[300] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold">AI 正在計算金額...</p>
    </div>

    <script>
        let gun, room, currentPwd;
        let state = { localCcy: 'JPY', homeCcy: 'TWD', rate: 0.21, useSvc: false, items: [] };

        // --- 🔐 解鎖與初始化 ---
        function unlockApp() {
            const pwd = document.getElementById('pwd-input').value;
            if (pwd.length < 1) return;

            currentPwd = pwd;
            const roomId = 'room-' + btoa(pwd).substring(0, 10);
            
            // 初始化數據連線
            gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
            room = gun.get(roomId);
            
            // 監聽雲端數據
            room.on(d => {
                if(d && d.c) {
                    state = JSON.parse(d.c);
                    render(false);
                }
            });

            // 進入 UI
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            document.getElementById('room-display').innerText = `已加密連線 (${pwd})`;
            sessionStorage.setItem('ml_pwd', pwd);

            // 如果是全新房間，放一個範例品項
            setTimeout(() => {
                if (state.items.length === 0) {
                    state.items.push({ id: Date.now(), name: "已成功進入房間", price: 0, qty: 1, picked: true });
                    render(true);
                }
            }, 1000);
        }

        // 自動登入
        if(sessionStorage.getItem('ml_pwd')) {
            document.getElementById('pwd-input').value = sessionStorage.getItem('ml_pwd');
            unlockApp();
        }

        function logout() {
            sessionStorage.removeItem('ml_pwd');
            location.reload();
        }

        // --- 匯率與 OCR 邏輯 ---
        async function autoFetch() {
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${state.localCcy}`);
                const data = await res.json();
                state.rate = data.rates[state.homeCcy].toFixed(5);
                render(true);
            } catch (e) { console.error("Rate API Error"); }
        }

        function updateConfig() {
            state.localCcy = document.getElementById('local-ccy').value;
            state.homeCcy = document.getElementById('home-ccy').value;
            autoFetch();
        }

        function manualRate(v) { state.rate = parseFloat(v); render(true); }

        async function processImage(input) {
            if (!input.files[0]) return;
            document.getElementById('scan-overlay').classList.remove('hidden');
            try {
                const worker = await Tesseract.createWorker('jpn+eng');
                const { data: { lines } } = await worker.recognize(input.files[0]);
                lines.forEach(l => {
                    const m = l.text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
                    if (m) {
                        const price = parseFloat(m[1].replace(/,/g, ''));
                        if (price > 1) state.items.push({ id: Date.now()+Math.random(), name: l.text.replace(m[0],'').trim().slice(0,10)||"品項", price, qty:1, picked:true });
                    }
                });
                await worker.terminate();
                render(true);
            } finally { document.getElementById('scan-overlay').classList.add('hidden'); }
        }

        // --- UI 渲染 ---
        function render(isLocal = true) {
            document.querySelectorAll('.local-code').forEach(el => el.innerText = state.localCcy);
            document.querySelectorAll('.home-code').forEach(el => el.innerText = state.homeCcy);
            document.getElementById('rate-display').value = state.rate;
            document.getElementById('svc-toggle').checked = state.useSvc;

            const list = document.getElementById('item-list');
            list.innerHTML = state.items.map(item => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-2 ${item.picked ? 'border-blue-500' : 'border-transparent'}">
                    <div onclick="toggle(${item.id})" class="flex-1">
                        <h3 class="font-bold text-slate-800">${item.name}</h3>
                        <p class="text-xs text-slate-400 font-mono">${state.localCcy} ${item.price} ≈ ${state.homeCcy} ${Math.round(item.price * state.rate)}</p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="updQty(${item.id},-1)" class="w-7 h-7 bg-slate-100 rounded-lg">-</button>
                        <span class="font-bold text-sm w-4 text-center">${item.qty}</span>
                        <button onclick="updQty(${item.id},1)" class="w-7 h-7 bg-slate-100 rounded-lg">+</button>
                        <button onclick="removeI(${item.id})" class="text-slate-200 pl-2">✕</button>
                    </div>
                </div>
            `).join('');

            const sel = state.items.filter(i => i.picked);
            let lSum = sel.reduce((s, i) => s + (i.price * i.qty), 0);
            if(state.useSvc) lSum *= 1.1;

            document.getElementById('total-local').innerText = Math.round(lSum).toLocaleString();
            document.getElementById('total-home').innerText = Math.round(lSum * state.rate).toLocaleString();

            if(isLocal && room) room.put({ c: JSON.stringify(state) });
        }

        function toggle(id) { const i = state.items.find(x=>x.id===id); i.picked = !i.picked; render(true); }
        function updQty(id, d) { const i = state.items.find(x=>x.id===id); i.qty = Math.max(1, i.qty+d); render(true); }
        function removeI(id) { state.items = state.items.filter(x=>x.id!==id); render(true); }
        function toggleSvc() { state.useSvc = document.getElementById('svc-toggle').checked; render(true); }
        function clearAll() { if(confirm("確定要清空所有資料？")) { state.items = []; render(true); } }
    </script>
</body>
</html>
