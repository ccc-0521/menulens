<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens HK - AI 終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --main-bg: #FFFBEB; --accent-orange: #FB923C; --deep-purple: #581C87; }
        body { background-color: white; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .food-card { background-color: var(--main-bg); border: 2px solid var(--accent-orange); transition: all 0.3s; border-radius: 2rem; overflow: hidden; }
        .food-card.unpicked { opacity: 0.5; filter: grayscale(0.8); transform: scale(0.97); }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 50; border-radius: 2rem 2rem 0 0; }
        .category-btn.active { background-color: var(--deep-purple); color: white; border-color: var(--deep-purple); }
        .processing-glow { animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-80">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6 text-white text-center">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl text-slate-800">
            <div class="text-5xl mb-4">🏮</div>
            <h2 class="text-2xl font-black mb-6 tracking-widest uppercase">MenuLens HK</h2>
            <input type="password" id="pwd-input" pattern="\d*" inputmode="numeric" placeholder="••••" 
                   class="w-full bg-slate-100 rounded-3xl p-5 text-center font-black text-3xl mb-6 outline-none border-4 border-transparent focus:border-orange-400">
            <button onclick="unlockApp()" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">開啟 AI 翻譯官</button>
        </div>
    </div>

    <div id="app-body" class="hidden">
        <header class="p-5 sticky top-0 bg-white z-40 border-b">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-3xl font-black text-slate-800 italic">Menu<span class="text-orange-500">Lens</span></h1>
                <div class="flex items-center space-x-3">
                    <button onclick="logout()" class="text-xs font-bold text-slate-400 underline">登出</button>
                    <label for="camera-direct" class="bg-purple-900 text-white p-3 rounded-2xl cursor-pointer shadow-lg active:scale-90 transition-all">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </label>
                    <input type="file" id="camera-direct" accept="image/*" capture="environment" onchange="processWithAI(this)" class="hidden">
                </div>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-4" id="cat-nav">
                <button onclick="filterCat('all')" class="category-btn active px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">全部品項</button>
                <button onclick="filterCat('刺身')" class="category-btn px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">刺身/冷盤</button>
                <button onclick="filterCat('主菜')" class="category-btn px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">燒物/主食</button>
                <button onclick="filterCat('飲料')" class="category-btn px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">飲品</button>
            </div>

            <div class="bg-blue-600 p-4 rounded-[2rem] text-white shadow-lg">
                <div class="flex justify-between items-center px-1">
                    <select id="local-ccy" onchange="updateCurrency()" class="bg-blue-700 font-bold p-1 rounded-xl outline-none border-none">
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="KRW">🇰🇷 KRW</option>
                    </select>
                    <span class="opacity-50">➜</span>
                    <select id="home-ccy" onchange="updateCurrency()" class="bg-blue-700 font-bold p-1 rounded-xl outline-none border-none">
                        <option value="HKD">🇭🇰 HKD</option>
                        <option value="TWD">🇹🇼 TWD</option>
                    </select>
                </div>
            </div>
        </header>

        <main id="item-list" class="p-6 grid gap-6 pb-40"></main>

        <div class="sticky-footer p-8 bg-white">
            <div id="progress-container" class="hidden mb-4">
                <div class="flex justify-between text-[10px] font-black text-purple-700 mb-1 uppercase">
                    <span id="p-status" class="processing-glow">Gemini AI 正在解讀手寫菜單...</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div id="loading-bar" class="h-full bg-purple-600 w-0 transition-all duration-300"></div>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">總金額</span>
                    <div class="flex items-baseline space-x-2 leading-none">
                        <span class="text-3xl font-black text-slate-900">¥<span id="total-local">0</span></span>
                        <span class="text-sm font-bold text-orange-500">≈ HK$<span id="total-home">0</span></span>
                    </div>
                </div>
                <button onclick="showCheckout()" class="bg-orange-500 text-white px-10 py-5 rounded-[1.8rem] font-black text-xl shadow-xl active:scale-95 transition-all">CHECKOUT</button>
            </div>
        </div>
    </div>

    <script>
        // --- 配置區 ---
        const GEMINI_API_KEY = "AIzaSyCa1JLVhvVhUslfuw8oexMktPh6D5ubfQ0"; // 請在此輸入您的 API Key
        let gun, room;
        let state = { local: 'JPY', home: 'HKD', rate: 0.051, items: [], currentCat: 'all' };

        // --- AI 辨識邏輯 ---
        async function processWithAI(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const pContainer = document.getElementById('progress-container');
            const lBar = document.getElementById('loading-bar');
            
            pContainer.classList.remove('hidden');
            lBar.style.width = '30%';

            try {
                const base64Image = await fileToBase64(file);
                lBar.style.width = '60%';

                const prompt = `你是一個專業的居酒屋菜單翻譯官。請辨識圖片中的菜單內容，並以 JSON 格式輸出。
                輸出格式範例：
                {"items": [{"name": "中文品名", "raw": "日文原名", "price": 299, "category": "刺身", "note": "備註"}]}
                分類請限定在：刺身, 主菜, 飲料, 其他。價格請提取未稅數字。`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }] }]
                    })
                });

                const data = await response.json();
                const textResult = data.candidates[0].content.parts[0].text;
                const jsonMatch = textResult.match(/\{.*\}/s);
                
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    parsed.items.forEach(item => {
                        state.items.push({
                            id: Date.now() + Math.random(),
                            ...item,
                            qty: 1,
                            picked: false
                        });
                    });
                }
                lBar.style.width = '100%';
                setTimeout(() => pContainer.classList.add('hidden'), 500);
                render(true);
            } catch (err) {
                console.error(err);
                alert("AI 辨識發生錯誤，請檢查網路或 API Key。");
                pContainer.classList.add('hidden');
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // --- 核心功能 ---
        function render(isLocal = true) {
            const list = document.getElementById('item-list');
            const filtered = state.currentCat === 'all' ? state.items : state.items.filter(i => i.category === state.currentCat);
            
            list.innerHTML = filtered.length === 0 ? `<div class="text-center py-20 text-slate-300 font-bold italic">🏮 點擊上方相機，上傳菜單照片</div>` : 
                filtered.map(item => `
                <div class="food-card p-6 relative mb-4 ${item.picked ? 'shadow-xl' : 'unpicked'}" onclick="toggle(${item.id})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-4">
                            <span class="bg-purple-900 text-[8px] text-white px-2 py-0.5 rounded-full font-black uppercase mb-2 inline-block">${item.category}</span>
                            <h3 class="text-xl font-black text-slate-800 leading-tight">${item.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold mt-1">日文：${item.raw}</p>
                            <div class="mt-4">
                                <span class="text-2xl font-black text-slate-900">¥${item.price}</span>
                                <span class="text-xs font-bold text-orange-500 ml-2">≈ HK$${Math.round(item.price * state.rate)}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center space-y-3" onclick="event.stopPropagation()">
                            <button onclick="updQty(${item.id}, 1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">+</button>
                            <span class="text-lg font-black">${item.qty}</span>
                            <button onclick="updQty(${item.id}, -1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">-</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const sel = state.items.filter(i => i.picked);
            const total = sel.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-local').innerText = total.toLocaleString();
            document.getElementById('total-home').innerText = Math.round(total * state.rate).toLocaleString();
            
            if (isLocal && room) room.put({ c: JSON.stringify(state) });
        }

        function toggle(id) { const i = state.items.find(x => x.id === id); i.picked = !i.picked; render(true); }
        function updQty(id, d) { const i = state.items.find(x => x.id === id); i.qty = Math.max(1, i.qty + d); render(true); }
        function filterCat(cat) { state.currentCat = cat; render(false); }

        function unlockApp() {
            const pwd = document.getElementById('pwd-input').value;
            if (!pwd) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            
            // 初始化 Gun 實現多機同步 (可選)
            gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
            room = gun.get('menulens-v2026-' + btoa(pwd).substring(0,8));
            room.on(d => { if(d && d.c) { state = JSON.parse(d.c); render(false); } });
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
