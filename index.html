<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuLens HK | 專業翻譯官</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .food-card { background: #fff; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .food-card.selected { border: 2px solid #f97316; background: #fff7ed; box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.15); }
        .food-card.unpicked { opacity: 0.5; filter: grayscale(1); transform: scale(0.96); }
        .btn-press:active { transform: scale(0.92); }
        .shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        ::-webkit-scrollbar { display: none; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-64">

    <header class="sticky top-0 z-50 glass border-b border-slate-200/50 px-5 pt-8 pb-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">Menu<span class="text-orange-500">Lens</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Professional Edition 2026</p>
            </div>
            <button onclick="clearList()" class="bg-red-50 text-red-500 text-[10px] font-black px-4 py-2 rounded-full border border-red-100 uppercase tracking-widest active:bg-red-100 transition-colors">Clear All</button>
        </div>

        <div class="flex gap-4 mb-6">
            <label for="camera-in" class="btn-press flex-[2.5] bg-orange-500 h-16 rounded-2xl flex items-center justify-center text-white font-black shadow-xl shadow-orange-500/30 cursor-pointer">
                <span class="text-2xl mr-3">📸</span> 拍照辨識
            </label>
            <input type="file" id="camera-in" accept="image/*" capture="environment" onchange="processImage(this)" class="hidden">

            <label for="file-in" class="btn-press flex-1 bg-slate-900 h-16 rounded-2xl flex items-center justify-center text-white font-black shadow-xl shadow-slate-900/20 cursor-pointer">
                <span class="text-2xl">📁</span>
            </label>
            <input type="file" id="file-in" accept="image/*" onchange="processImage(this)" class="hidden">
        </div>

        <div class="bg-slate-100/80 rounded-2xl p-4 flex items-center justify-between border border-slate-200/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm">💱</div>
                <select id="ccy-select" onchange="updateExchange()" class="bg-transparent font-black text-sm outline-none text-slate-700">
                    <option value="HKD">🇭🇰 港幣 HKD</option>
                    <option value="TWD">🇹🇼 台幣 TWD</option>
                    <option value="USD">🇺🇸 美金 USD</option>
                    <option value="EUR">🇪🇺 歐元 EUR</option>
                </select>
            </div>
            <div id="rate-tag" class="text-[11px] font-black text-orange-600 bg-orange-100 px-3 py-1 rounded-lg">Rate: Loading...</div>
        </div>
    </header>

    <div id="loading-bar" class="hidden sticky top-[215px] z-40 px-6 py-3 bg-slate-900 text-white text-xs font-bold text-center">
        <span class="inline-block animate-bounce mr-2">🏮</span> AI 正在透過 Cloudflare 安全隧道解析菜單...
    </div>

    <main id="main-list" class="p-5 space-y-6">
        <div class="py-24 text-center">
            <div class="text-8xl mb-8 opacity-20">🏮</div>
            <p class="text-slate-400 font-black text-lg">準備好翻譯您的菜單</p>
            <p class="text-slate-300 text-xs mt-2 uppercase tracking-widest font-bold">Encrypted & Secure API Connection</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200/60 p-8 pb-10 z-50 rounded-t-[3rem] shadow-[0_-15px_50px_-15px_rgba(0,0,0,0.1)]">
        <div class="max-w-md mx-auto flex justify-between items-end">
            <div class="space-y-2">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Bill Estimate</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-2xl font-black text-slate-400">¥</span>
                    <span id="total-jpy" class="text-5xl font-black tracking-tighter text-slate-900">0</span>
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <div id="ccy-code" class="bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-sm uppercase">HKD</div>
                    <div class="text-2xl font-black text-orange-600 tracking-tighter">≈ <span id="total-converted">0.0</span></div>
                </div>
            </div>
            <button onclick="confirmBill()" class="btn-press bg-slate-900 text-white px-10 py-5 rounded-[2rem] font-black text-lg shadow-2xl shadow-slate-900/40 active:bg-orange-600 transition-all">
                CHECKOUT
            </button>
        </div>
        <div class="safe-pb"></div>
    </footer>

    <script>
        // ==========================================
        // 🚨 重要：請在此填入您的 CLOUDFLARE WORKER 網址
        const WORKER_URL = "https://small-cell-2eaf.monetcheung1202.workers.dev"; 
        // ==========================================

        let state = { items: [], rate: 0.051, sym: 'HK$' };
        const symMap = { 'HKD': 'HK$', 'TWD': 'NT$', 'USD': '$', 'EUR': '€' };

        // 1. 初始化即時匯率
        async function updateExchange() {
            const ccy = document.getElementById('ccy-select').value;
            state.sym = symMap[ccy];
            document.getElementById('ccy-code').innerText = ccy;
            try {
                const res = await fetch("https://open.er-api.com/v6/latest/JPY");
                const data = await res.json();
                state.rate = data.rates[ccy];
                document.getElementById('rate-tag').innerText = `1 JPY ≈ ${state.rate.toFixed(4)} ${ccy}`;
                render();
            } catch(e) { 
                document.getElementById('rate-tag').innerText = "Exchange Offline"; 
            }
        }
        updateExchange();

        // 2. 核心 AI 辨識邏輯
        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            const loader = document.getElementById('loading-bar');
            loader.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const prompt = "你是一個居酒屋點餐專家。辨識圖片中的菜單。將品項轉為繁體中文並分類。僅輸出 JSON 格式：{\"data\":[{\"name\":\"中文品名\",\"raw\":\"日文名\",\"price\":數字,\"cat\":\"分類\"}]}";

                try {
                    const response = await fetch(WORKER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ] }]
                        })
                    });
                    const result = await response.json();
                    const aiText = result.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.match(/\{.*\}/s);
                    
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        parsed.data.forEach(i => {
                            state.items.push({ ...i, id: Date.now() + Math.random(), qty: 1, picked: true });
                        });
                        render();
                    }
                } catch (err) {
                    alert("⚠️ 辨識失敗！請檢查 Worker 網址或 Cloudflare 環境變數 GEMINI_API_KEY。");
                } finally {
                    loader.classList.add('hidden');
                    input.value = "";
                }
            };
        }

        // 3. 介面渲染邏輯
        function render() {
            const listEl = document.getElementById('main-list');
            if (state.items.length === 0) return;

            listEl.innerHTML = state.items.map(item => `
                <div class="food-card p-6 ${item.picked ? 'selected' : 'unpicked'}" onclick="togglePick(${item.id})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-4">
                            <span class="text-[9px] bg-slate-900 text-white px-2 py-1 rounded font-black uppercase tracking-widest">${item.cat}</span>
                            <h3 class="text-xl font-black text-slate-800 mt-3 tracking-tight">${item.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-relaxed">${item.raw}</p>
                            
                            <div class="mt-6 flex items-baseline gap-3">
                                <span class="text-3xl font-black text-slate-900 leading-none"><span class="text-sm mr-1">¥</span>${item.price.toLocaleString()}</span>
                                <span class="text-sm font-bold text-orange-500 leading-none">≈ ${state.sym}${(item.price * state.rate).toFixed(1)}</span>
                            </div>
                        </div>
                        
                        <div class="flex flex-col items-center gap-3" onclick="event.stopPropagation()">
                             <button onclick="changeQty(${item.id}, 1)" class="btn-press w-12 h-12 bg-white rounded-2xl border-2 border-slate-100 shadow-sm font-black text-slate-800 text-2xl flex items-center justify-center">+</button>
                             <span class="font-black text-xl text-slate-900">${item.qty}</span>
                             <button onclick="changeQty(${item.id}, -1)" class="btn-press w-12 h-12 bg-white rounded-2xl border-2 border-slate-100 shadow-sm font-black text-slate-800 text-2xl flex items-center justify-center">-</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateTotal();
        }

        function togglePick(id) {
            const item = state.items.find(i => i.id === id);
            item.picked = !item.picked;
            render();
        }

        function changeQty(id, delta) {
            const item = state.items.find(i => i.id === id);
            item.qty = Math.max(1, item.qty + delta);
            render();
        }

        function updateTotal() {
            const selected = state.items.filter(i => i.picked);
            const jpyTotal = selected.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-jpy').innerText = jpyTotal.toLocaleString();
            document.getElementById('total-converted').innerText = (jpyTotal * state.rate).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
        }

        function clearList() {
            if (confirm("🏮 確定要清空所有已辨識的菜單嗎？")) {
                state.items = [];
                location.reload();
            }
        }

        function confirmBill() {
            const count = state.items.filter(i => i.picked).length;
            if (count === 0) return alert("尚未選取餐點");
            alert(`🏮 點餐確認\n已選取 ${count} 項商品\n請將畫面出示給店員。祝您用餐愉快！`);
        }
    </script>
</body>
</html>
