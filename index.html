<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens HK - 穩定加強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main-bg: #FFFBEB; --accent-orange: #FB923C; }
        body { background-color: #F8FAFC; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 讓卡片更適合手指點擊 */
        .food-card { background-color: var(--main-bg); border: 2px solid var(--accent-orange); border-radius: 1.5rem; transition: all 0.2s active; }
        .food-card:active { transform: scale(0.98); }
        .unpicked { opacity: 0.5; filter: grayscale(1); border-color: #CBD5E1; }
        
        /* 底部控制台優化 */
        .sticky-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05); z-index: 50; 
            padding: 1.5rem 1.5rem 2.5rem 1.5rem; border-radius: 2rem 2rem 0 0; 
        }

        .processing-glow { animation: glow 1.2s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* 隱藏捲軸 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-60">

    <header class="p-5 sticky top-0 bg-white/80 backdrop-blur-md z-40 border-b flex justify-between items-center">
        <h1 class="text-2xl font-black italic text-slate-800">Menu<span class="text-orange-500">Lens</span></h1>
        
        <label for="img-upload" class="bg-orange-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg shadow-orange-200 active:bg-orange-600">
            📸 拍照辨識
        </label>
        <input type="file" id="img-upload" accept="image/*" capture="environment" onchange="processWithOpenRouter(this)" class="hidden">
    </header>

    <div id="status-bar" class="hidden px-6 py-4 bg-purple-50 border-b border-purple-100">
        <p class="processing-glow font-black text-purple-700 text-sm text-center">🏮 AI 正在解析菜單，請稍候...</p>
    </div>

    <main id="item-list" class="p-5 space-y-4">
        <div class="py-20 flex flex-col items-center justify-center text-slate-300">
            <span class="text-6xl mb-4">🍱</span>
            <p class="font-bold">請點擊右上角拍照開始</p>
        </div>
    </main>

    <footer class="sticky-footer">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Bill</p>
                <div class="text-4xl font-black text-slate-900 leading-none">
                    <span class="text-xl mr-1">¥</span><span id="total-price">0</span>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 text-slate-400 px-5 py-3 rounded-xl font-bold text-sm">
                重置
            </button>
        </div>
    </footer>

    <script>
        // --- 請在這裡填入 OpenRouter API Key ---
        const OPENROUTER_API_KEY = "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"; 
        let items = [];

        async function processWithOpenRouter(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const statusBar = document.getElementById('status-bar');
            
            statusBar.classList.remove('hidden');

            try {
                const base64 = await fileToBase64(file);

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-flash-1.5", 
                        "messages": [
                            {
                                "role": "user",
                                "content": [
                                    { "type": "text", "text": "你是一個專業翻譯。請辨識這張菜單並分類，轉為繁體中文，僅輸出 JSON：{\"data\": [{\"name\": \"品名\", \"raw\": \"日文\", \"price\": 數字, \"cat\": \"分類\"}]}" },
                                    { "type": "image_url", "image_url": { "url": base64 } }
                                ]
                            }
                        ]
                    })
                });

                const result = await response.json();
                const content = result.choices[0].message.content;
                const jsonMatch = content.match(/\{.*\}/s);
                
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    items = parsed.data.map(i => ({ ...i, id: Math.random(), qty: 1, picked: true }));
                    render();
                }
            } catch (err) {
                alert("辨識故障：請確認 API Key 有效且網路通暢。");
            } finally {
                statusBar.classList.add('hidden');
            }
        }

        function fileToBase64(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function render() {
            const list = document.getElementById('item-list');
            if (items.length === 0) return;

            list.innerHTML = items.map(item => `
                <div class="food-card p-5 ${item.picked ? '' : 'unpicked'}" onclick="toggle(${item.id})">
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <span class="text-[10px] bg-white/50 text-orange-700 px-2 py-0.5 rounded font-bold uppercase tracking-tighter border border-orange-200">${item.cat}</span>
                            <h3 class="text-xl font-black text-slate-800 mt-1">${item.name}</h3>
                            <p class="text-xs text-slate-400 font-medium">Original: ${item.raw}</p>
                            <div class="mt-3 text-2xl font-black text-slate-900">
                                <span class="text-sm font-bold">¥</span>${item.price}
                            </div>
                        </div>
                        <div class="bg-white/40 h-12 w-12 rounded-full flex items-center justify-center font-black text-lg border-2 border-white">
                            ${item.picked ? '✅' : '⚪️'}
                        </div>
                    </div>
                </div>
            `).join('');

            const total = items.filter(i => i.picked).reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-price').innerText = total.toLocaleString();
        }

        function toggle(id) {
            const item = items.find(i => i.id === id);
            item.picked = !item.picked;
            render();
        }
    </script>
</body>
</html>
