<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuLens World | 全球翻譯官</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .food-card { background: #fff; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        .food-card.selected { border: 2px solid #f97316; background: #fff7ed; box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.15); }
        .food-card.unpicked { opacity: 0.5; filter: grayscale(1); transform: scale(0.96); }
        .btn-press:active { transform: scale(0.92); }
        ::-webkit-scrollbar { display: none; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-64">

    <header class="sticky top-0 z-50 glass border-b border-slate-200/50 px-5 pt-8 pb-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">Menu<span class="text-orange-500">World</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Multi-Currency Edition</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 text-slate-500 text-[10px] font-black px-4 py-2 rounded-full border border-slate-200 uppercase tracking-widest active:bg-slate-200 transition-colors">Reset</button>
        </div>

        <div class="flex gap-4 mb-6">
            <label for="camera-in" class="btn-press flex-[2.5] bg-orange-500 h-16 rounded-2xl flex items-center justify-center text-white font-black shadow-xl shadow-orange-500/30 cursor-pointer">
                <span class="text-2xl mr-3">📸</span> 拍照辨識
            </label>
            <input type="file" id="camera-in" accept="image/*" capture="environment" onchange="processImage(this)" class="hidden">

            <label for="file-in" class="btn-press flex-1 bg-slate-900 h-16 rounded-2xl flex items-center justify-center text-white font-black shadow-xl shadow-slate-900/20 cursor-pointer">
                <span class="text-2xl">📁</span>
            </label>
            <input type="file" id="file-in" accept="image/*" onchange="processImage(this)" class="hidden">
        </div>

        <div class="bg-slate-100/80 rounded-2xl p-4 flex items-center justify-between border border-slate-200/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm">🏠</div>
                <select id="home-ccy" onchange="getGlobalRate()" class="bg-transparent font-black text-sm outline-none text-slate-700">
                    <option value="HKD">🇭🇰 港幣 HKD</option>
                    <option value="TWD">🇹🇼 台幣 TWD</option>
                    <option value="USD">🇺🇸 美金 USD</option>
                    <option value="EUR">🇪🇺 歐元 EUR</option>
                    <option value="JPY">🇯🇵 日圓 JPY</option>
                </select>
            </div>
            <div id="rate-tag" class="text-[11px] font-black text-orange-600 bg-orange-100 px-3 py-1 rounded-lg">等待自動偵測貨幣...</div>
        </div>
    </header>

    <div id="loading-bar" class="hidden sticky top-[215px] z-40 px-6 py-3 bg-slate-900 text-white text-xs font-bold text-center">
        <span class="inline-block animate-bounce mr-2">🌍</span> AI 正在判斷語言與貨幣並翻譯中...
    </div>

    <main id="main-list" class="p-5 space-y-6">
        <div class="py-24 text-center">
            <div class="text-8xl mb-8 opacity-20">🌍</div>
            <p class="text-slate-400 font-black text-lg">支援全球超過 50 種貨幣</p>
            <p class="text-slate-300 text-xs mt-2 uppercase tracking-widest font-bold italic">Automatic Currency Detection</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200/60 p-8 pb-10 z-50 rounded-t-[3rem] shadow-[0_-15px_50px_-15px_rgba(0,0,0,0.1)]">
        <div class="max-w-md mx-auto flex justify-between items-end">
            <div class="space-y-2">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Total Local Price (<span id="local-ccy-name">---</span>)</p>
                <div class="flex items-baseline gap-2">
                    <span id="local-ccy-sym" class="text-2xl font-black text-slate-400">---</span>
                    <span id="total-local" class="text-5xl font-black tracking-tighter text-slate-900">0</span>
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <div id="home-ccy-label" class="bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded shadow-sm uppercase">HKD</div>
                    <div class="text-2xl font-black text-orange-600 tracking-tighter">≈ <span id="total-converted">0.0</span></div>
                </div>
            </div>
            <button onclick="confirmBill()" class="btn-press bg-slate-900 text-white px-10 py-5 rounded-[2rem] font-black text-lg shadow-2xl shadow-slate-900/40">
                CHECKOUT
            </button>
        </div>
        <div class="safe-pb"></div>
    </footer>

    <script>
        // ==========================================
        const WORKER_URL = "https://small-cell-2eaf.monetcheung1202.workers.dev"; 
        // ==========================================

        let state = { items: [], localCcy: '', homeCcy: 'HKD', rate: 1, symMap: {'JPY':'¥', 'HKD':'HK$', 'TWD':'NT$', 'USD':'$', 'EUR':'€', 'KRW':'₩', 'THB':'฿', 'GBP':'£'} };

        // 1. 全球匯率獲取 (動態)
        async function getGlobalRate() {
            state.homeCcy = document.getElementById('home-ccy').value;
            document.getElementById('home-ccy-label').innerText = state.homeCcy;
            
            if (!state.localCcy) return;

            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${state.localCcy}`);
                const data = await res.json();
                state.rate = data.rates[state.homeCcy];
                document.getElementById('rate-tag').innerText = `1 ${state.localCcy} ≈ ${state.rate.toFixed(4)} ${state.homeCcy}`;
                render();
            } catch(e) { console.error("Rate error"); }
        }

        // 2. AI 處理 (加入貨幣偵測指令)
        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            const loader = document.getElementById('loading-bar');
            loader.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                // 💡 重點：讓 AI 自動偵測貨幣代碼 (ISO 4217)
                const prompt = "你是一個全球旅行翻譯官。請辨識這張菜單並：1. 偵測這是哪國貨幣並給出 ISO 代碼 (如 JPY, KRW, THB, EUR)。 2. 翻譯品項為繁體中文並列出價格。僅輸出 JSON：{\"currency\": \"ISO代碼\", \"data\": [{\"name\": \"中文名\", \"raw\": \"原文\", \"price\": 數字, \"cat\": \"分類\"}]}";

                try {
                    const response = await fetch(WORKER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }]
                        })
                    });
                    const result = await response.json();
                    const aiText = result.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.match(/\{.*\}/s);
                    
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        state.localCcy = parsed.currency;
                        document.getElementById('local-ccy-name').innerText = state.localCcy;
                        document.getElementById('local-ccy-sym').innerText = state.symMap[state.localCcy] || state.localCcy;
                        
                        parsed.data.forEach(i => {
                            state.items.push({ ...i, id: Date.now() + Math.random(), qty: 1, picked: true });
                        });
                        await getGlobalRate(); // 獲取新幣值的匯率
                    }
                } catch (err) {
                    alert("⚠️ 辨識失敗！");
                } finally {
                    loader.classList.add('hidden');
                }
            };
        }

        function render() {
            const listEl = document.getElementById('main-list');
            const sym = state.symMap[state.localCcy] || '';
            const homeSym = state.symMap[state.homeCcy] || '';
            
            listEl.innerHTML = state.items.map(item => `
                <div class="food-card p-6 ${item.picked ? 'selected' : 'unpicked'}" onclick="togglePick(${item.id})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-4">
                            <span class="text-[9px] bg-slate-900 text-white px-2 py-1 rounded font-black uppercase tracking-widest">${item.cat}</span>
                            <h3 class="text-xl font-black text-slate-800 mt-3">${item.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold mt-1 leading-relaxed">${item.raw}</p>
                            <div class="mt-6 flex items-baseline gap-3">
                                <span class="text-3xl font-black text-slate-900"><span class="text-sm mr-1">${sym}</span>${item.price.toLocaleString()}</span>
                                <span class="text-sm font-bold text-orange-500">≈ ${homeSym}${(item.price * state.rate).toFixed(1)}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center gap-3" onclick="event.stopPropagation()">
                             <button onclick="changeQty(${item.id}, 1)" class="btn-press w-12 h-12 bg-white rounded-2xl border-2 border-slate-100 shadow-sm font-black text-2xl flex items-center justify-center">+</button>
                             <span class="font-black text-xl text-slate-900">${item.qty}</span>
                             <button onclick="changeQty(${item.id}, -1)" class="btn-press w-12 h-12 bg-white rounded-2xl border-2 border-slate-100 shadow-sm font-black text-2xl flex items-center justify-center">-</button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        function togglePick(id) {
            const item = state.items.find(i => i.id === id);
            item.picked = !item.picked;
            render();
        }

        function changeQty(id, delta) {
            const item = state.items.find(i => i.id === id);
            item.qty = Math.max(1, item.qty + delta);
            render();
        }

        function updateTotal() {
            const selected = state.items.filter(i => i.picked);
            const localTotal = selected.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-local').innerText = localTotal.toLocaleString();
            document.getElementById('total-converted').innerText = (localTotal * state.rate).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});
        }

        function confirmBill() {
            alert(`🏮 結帳確認\n當地貨幣: ${state.localCcy}\n實付總額: ${(state.items.filter(i => i.picked).reduce((s, i) => s + (i.price * i.qty), 0) * state.rate).toFixed(1)} ${state.homeCcy}`);
        }
    </script>
</body>
</html>
