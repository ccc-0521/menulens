<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens HK - 穩定極速版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        :root { --main-bg: #FFFBEB; --accent-orange: #FB923C; --deep-purple: #581C87; }
        body { background-color: white; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .food-card { background-color: var(--main-bg); border: 2px solid var(--accent-orange); transition: all 0.3s; position: relative; }
        .food-card.unpicked { opacity: 0.5; filter: grayscale(1); transform: scale(0.96); }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 50; border-radius: 2rem 2rem 0 0; }
        .processing-glow { animation: glow 1.5s infinite; color: #7C3AED; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-80">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6 text-white text-center">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-6 tracking-widest uppercase">MenuLens HK</h2>
            <input type="number" id="pwd-input" pattern="\d*" inputmode="numeric" placeholder="密碼" 
                   class="w-full bg-slate-100 rounded-3xl p-5 text-center font-black text-3xl mb-6 text-slate-800 outline-none border-4 border-transparent focus:border-orange-400">
            <button onclick="unlockApp()" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">進入系統</button>
        </div>
    </div>

    <div id="app-body" class="hidden">
        <header class="p-5 sticky top-0 bg-white z-40 border-b">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-slate-800 italic">Menu<span class="text-orange-500">Lens</span></h1>
                <div class="flex items-center space-x-3">
                    <button onclick="logout()" class="text-xs font-bold text-slate-400">登出</button>
                    <label for="camera-direct" class="bg-purple-900 text-white p-3 rounded-2xl cursor-pointer shadow-lg active:scale-90 transition-transform">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </label>
                    <input type="file" id="camera-direct" accept="image/*" capture="environment" onchange="processImages(this)" class="hidden">
                    <label for="album-selection" class="bg-slate-800 text-white p-3 rounded-2xl cursor-pointer shadow-lg active:scale-90">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </label>
                    <input type="file" id="album-selection" accept="image/*" multiple onchange="processImages(this)" class="hidden">
                </div>
            </div>
            <div class="bg-blue-600 p-4 rounded-[2rem] text-white shadow-lg flex justify-between items-center font-mono text-xs">
                <span>1 JPY =</span>
                <input type="number" id="rate-display" step="0.0001" onchange="manualRate(this.value)" class="bg-blue-800 text-right px-2 py-1 rounded w-24 outline-none border-none text-blue-200">
                <span class="font-bold">HKD</span>
            </div>
        </header>

        <main id="item-list" class="p-6 grid gap-6 pb-20"></main>

        <div class="sticky-footer p-8 bg-white">
            <div id="progress-container" class="hidden mb-4">
                <div class="flex justify-between text-[10px] font-black text-purple-700 mb-1">
                    <span id="p-status" class="processing-glow uppercase">辨識中...</span>
                    <span id="p-count">0/0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div id="loading-bar" class="h-full bg-purple-600 w-0 transition-all duration-300"></div>
                </div>
            </div>
            <div class="flex justify-between items-center mb-6">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase">Selected Bill</span>
                    <div class="flex items-baseline space-x-2">
                        <span class="text-3xl font-black text-slate-900">¥<span id="total-local">0</span></span>
                        <span class="text-sm font-bold text-orange-500">≈ HK$<span id="total-home">0</span></span>
                    </div>
                </div>
                <button onclick="showCheckout()" class="bg-orange-500 text-white px-10 py-5 rounded-[1.8rem] font-black text-xl shadow-xl active:scale-95">CHECKOUT</button>
            </div>
            <div class="flex justify-between items-center">
                <label class="flex items-center space-x-2 text-[11px] font-bold text-slate-400">
                    <input type="checkbox" id="svc-fee" onchange="toggleSvc()" class="accent-orange-500">
                    <span>+10% 服務費</span>
                </label>
                <button onclick="clearAll()" class="text-[11px] font-bold text-red-400 underline">Clear All</button>
            </div>
        </div>
    </div>

    <script>
        let gun, room;
        let state = { rate: 0.051, useSvc: false, items: [] };

        function unlockApp() {
            const pwd = document.getElementById('pwd-input').value;
            if (!pwd) return;
            const roomId = 'room-hk-fix-stable-' + btoa(pwd).substring(0, 8);
            gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
            room = gun.get(roomId);
            room.on(d => { if(d && d.c) { state = JSON.parse(d.c); render(false); } });
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            sessionStorage.setItem('ml_last_pwd', pwd);
        }

        async function translate(text) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURI(text)}`);
                const data = await res.json();
                return data[0][0][0];
            } catch (e) { return text; }
        }

        // --- 📸 暴力啟動辨識邏輯 ---
        async function processImages(input) {
            if (!input.files || input.files.length === 0) return;
            
            const pContainer = document.getElementById('progress-container');
            const pStatus = document.getElementById('p-status');
            const lBar = document.getElementById('loading-bar');
            
            pContainer.classList.remove('hidden');
            pStatus.innerText = "正在加載 AI 引擎...";
            lBar.style.width = '10%';

            try {
                // 1. 每一次呼叫都建立一個獨立的 Worker，確保不被舊狀態卡死
                const worker = await Tesseract.createWorker({
                    corePath: 'https://unpkg.com/tesseract.js-core@v5.0.0/tesseract-core.wasm.js',
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            lBar.style.width = Math.floor(m.progress * 100) + '%';
                            pStatus.innerText = "文字分析中...";
                        }
                    }
                });

                await worker.loadLanguage('jpn+eng');
                await worker.initialize('jpn+eng');
                
                const files = Array.from(input.files);
                for (let i = 0; i < files.length; i++) {
                    pStatus.innerText = `辨識中 (${i+1}/${files.length})...`;
                    const { data: { lines } } = await worker.recognize(files[i]);
                    
                    for (let l of lines) {
                        const m = l.text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
                        if (m) {
                            const price = parseFloat(m[1].replace(/,/g, ''));
                            const raw = l.text.replace(m[0],'').trim();
                            if (price > 10 && raw.length > 1) {
                                const trans = await translate(raw);
                                state.items.push({ 
                                    id: Date.now() + Math.random(), 
                                    name: trans, raw: raw, price, qty: 1, picked: false 
                                });
                            }
                        }
                    }
                    render(true);
                }

                // 2. 結束後立刻釋放 Worker，避免佔用手機記憶體
                await worker.terminate();
                pContainer.classList.add('hidden');
            } catch (err) {
                alert("辨識引擎啟動逾時。請檢查網絡或刷新頁面重試。");
                console.error(err);
            }
            input.value = ""; 
        }

        function render(isLocal = true) {
            document.getElementById('rate-display').value = state.rate;
            const list = document.getElementById('item-list');
            list.innerHTML = state.items.length === 0 ? `<div class="text-center py-20 text-slate-300 font-bold italic">清單空白，請拍照加入</div>` : 
                state.items.map(item => `
                <div class="food-card p-6 rounded-[2.5rem] ${item.picked ? 'shadow-xl' : 'unpicked opacity-50 grayscale'}" onclick="toggle(${item.id})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-6">
                            <h3 class="text-xl font-black text-slate-800 mb-1" onclick="editName(${item.id}, '${item.name}')">${item.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold mb-3 uppercase tracking-tighter">${item.raw}</p>
                            <div class="flex items-baseline space-x-2 leading-none">
                                <span class="text-2xl font-black text-slate-900 italic">¥${item.price.toLocaleString()}</span>
                                <span class="text-[10px] font-black text-orange-600 uppercase">≈ HK$${Math.round(item.price * state.rate)}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center space-y-4" onclick="event.stopPropagation()">
                            <button onclick="updQty(${item.id}, 1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">+</button>
                            <span class="text-lg font-black text-slate-800">${item.qty}</span>
                            <button onclick="updQty(${item.id}, -1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">-</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const sel = state.items.filter(i => i.picked);
            let total = sel.reduce((s, i) => s + (i.price * i.qty), 0) * (state.useSvc ? 1.1 : 1);
            document.getElementById('total-local').innerText = Math.round(total).toLocaleString();
            document.getElementById('total-home').innerText = Math.round(total * state.rate).toLocaleString();
            if (isLocal && room) room.put({ c: JSON.stringify(state) });
        }

        function toggle(id) { const i = state.items.find(x => x.id === id); i.picked = !i.picked; render(true); }
        function updQty(id, d) { event.stopPropagation(); const i = state.items.find(x => x.id === id); i.qty = Math.max(1, i.qty + d); render(true); }
        function editName(id, current) { event.stopPropagation(); const n = prompt("修改名稱：", current); if(n) { state.items.find(x=>x.id===id).name = n; render(true); } }
        function toggleSvc() { state.useSvc = document.getElementById('svc-fee').checked; render(true); }
        function manualRate(v) { state.rate = parseFloat(v); render(true); }
        function clearAll() { if(confirm("清空？")) { state.items = []; render(true); } }
        function showCheckout() {
            const sel = state.items.filter(i => i.picked);
            if(!sel.length) return alert("未選品項");
            alert("已彙總至 Checkout，請檢查列表總額。");
        }
        function logout() { sessionStorage.removeItem('ml_last_pwd'); location.reload(); }
    </script>
</body>
</html>
