<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens HK 終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main-bg: #FFFBEB; --accent-orange: #FB923C; }
        body { background-color: #F8FAFC; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .food-card { background-color: var(--main-bg); border: 2px solid var(--accent-orange); border-radius: 1.5rem; transition: all 0.2s; }
        .unpicked { opacity: 0.5; filter: grayscale(1); border-color: #CBD5E1; }
        .sticky-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05); z-index: 50; 
            padding: 1.5rem 1.5rem 2.5rem 1.5rem; border-radius: 2rem 2rem 0 0; 
        }
        .processing-glow { animation: glow 1.2s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-60">

    <header class="p-5 sticky top-0 bg-white/80 backdrop-blur-md z-40 border-b flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic text-slate-800">Menu<span class="text-orange-500">Lens</span></h1>
            <p id="rate-info" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">匯率加載中...</p>
        </div>
        <label for="img-upload" class="bg-orange-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg active:scale-95 transition-all">
            📸 拍照點餐
        </label>
        <input type="file" id="img-upload" accept="image/*" capture="environment" onchange="processWithWorker(this)" class="hidden">
    </header>

    <div id="status-bar" class="hidden px-6 py-4 bg-purple-50 border-b border-purple-100">
        <p class="processing-glow font-black text-purple-700 text-sm text-center">🏮 AI 正在透過雲端加密通道解析菜單...</p>
    </div>

    <main id="item-list" class="p-5 space-y-4">
        <div class="py-20 flex flex-col items-center justify-center text-slate-300 text-center">
            <span class="text-6xl mb-4">🍱</span>
            <p class="font-bold">請拍攝菜單開始<br><span class="text-xs font-normal">(金鑰已在雲端安全保護)</span></p>
        </div>
    </main>

    <footer class="sticky-footer">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">估計總金額</p>
                <div class="text-4xl font-black text-slate-900 leading-none">
                    <span class="text-xl mr-1">¥</span><span id="total-local">0</span>
                </div>
                <p class="text-orange-500 font-bold text-sm mt-2">≈ HK$ <span id="total-home">0</span></p>
            </div>
            <div class="flex flex-col space-y-2">
                <button onclick="location.reload()" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-xl font-bold text-xs">重置清單</button>
                <button onclick="alert('點餐確認完畢！')" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-sm shadow-xl">完成</button>
            </div>
        </div>
    </footer>

    <script>
        // --- 設定區 ---
        const WORKER_URL = "https://small-cell-2eaf.monetcheung1202.workers.dev"; // 👈 請填入你的 Cloudflare Worker 網址
        let state = { items: [], rate: 0.052 }; // 預設匯率

        // 1. 初始化獲取即時匯率
        async function getExchangeRate() {
            try {
                const res = await fetch("https://open.er-api.com/v6/latest/JPY");
                const data = await res.json();
                state.rate = data.rates.HKD;
                document.getElementById('rate-info').innerText = `1 JPY ≈ ${state.rate.toFixed(4)} HKD`;
            } catch (e) {
                document.getElementById('rate-info').innerText = `使用預設匯率 0.052`;
            }
        }
        getExchangeRate();

        // 2. 處理圖片辨識
        async function processWithWorker(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const statusBar = document.getElementById('status-bar');
            statusBar.classList.remove('hidden');

            try {
                const base64 = await fileToBase64(file);
                const prompt = "你是一個專業日文翻譯，請辨識菜單。將餐點分類並轉為繁體中文，僅輸出 JSON 格式：{\"data\": [{\"name\": \"品名\", \"raw\": \"日文\", \"price\": 數字, \"cat\": \"分類\"}]}";

                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: prompt }, 
                            { inline_data: { mime_type: "image/jpeg", data: base64.split(',')[1] } }
                        ] }]
                    })
                });

                const result = await response.json();
                // 檢查是否從 Worker 回傳了正確結構
                const content = result.candidates[0].content.parts[0].text;
                const jsonMatch = content.match(/\{.*\}/s);
                
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    state.items = parsed.data.map(i => ({ ...i, id: Math.random(), qty: 1, picked: true }));
                    render();
                }
            } catch (err) {
                console.error(err);
                alert("辨識故障：請確認 Worker 網址正確且 API Key 已設定。");
            } finally {
                statusBar.classList.add('hidden');
            }
        }

        function fileToBase64(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        // 3. 渲染 UI
        function render() {
            const list = document.getElementById('item-list');
            if (state.items.length === 0) return;

            list.innerHTML = state.items.map(item => `
                <div class="food-card p-5 ${item.picked ? '' : 'unpicked'}" onclick="toggle(${item.id})">
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <span class="text-[10px] bg-white/50 text-orange-700 px-2 py-0.5 rounded font-bold border border-orange-200">${item.cat}</span>
                            <h3 class="text-lg font-black text-slate-800 mt-1">${item.name}</h3>
                            <p class="text-[10px] text-slate-400">原名: ${item.raw}</p>
                            <div class="mt-3 text-xl font-black text-slate-900">
                                <span class="text-xs mr-0.5">¥</span>${item.price}
                                <span class="text-xs font-bold text-orange-500 ml-2">≈ $${(item.price * state.rate).toFixed(1)}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2" onclick="event.stopPropagation()">
                             <button onclick="updQty(${item.id}, -1)" class="w-8 h-8 bg-white rounded-full shadow-sm border font-bold text-slate-400">-</button>
                             <span class="font-black text-slate-700">${item.qty}</span>
                             <button onclick="updQty(${item.id}, 1)" class="w-8 h-8 bg-white rounded-full shadow-sm border font-bold text-slate-700">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateTotal();
        }

        function updateTotal() {
            const selected = state.items.filter(i => i.picked);
            const totalLocal = selected.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-local').innerText = totalLocal.toLocaleString();
            document.getElementById('total-home').innerText = (totalLocal * state.rate).toLocaleString(undefined, {maximumFractionDigits: 1});
        }

        function toggle(id) {
            const item = state.items.find(i => i.id === id);
            item.picked = !item.picked;
            render();
        }

        function updQty(id, d) {
            const item = state.items.find(i => i.id === id);
            item.qty = Math.max(1, item.qty + d);
            render();
        }
    </script>
</body>
</html>
