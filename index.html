<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MenuLens HK - 極速辨識版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        :root { --main-bg: #FFFBEB; --accent-orange: #FB923C; --soft-brown: #78350F; --deep-purple: #581C87; }
        body { background-color: white; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .food-card { background-color: var(--main-bg); border: 2px solid var(--accent-orange); transition: all 0.3s ease; position: relative; }
        .food-card.unpicked { filter: grayscale(0.8); opacity: 0.5; transform: scale(0.96); border-color: #E5E7EB; background-color: #F9FAFB; }
        .category-btn.active { background-color: var(--deep-purple); color: white; border-color: var(--deep-purple); }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 50; border-radius: 2.5rem 2.5rem 0 0; }
        .edit-hint { position: absolute; top: 12px; right: 12px; font-size: 8px; color: var(--accent-orange); font-weight: bold; text-transform: uppercase; }
        /* 閃爍動畫表示正在處理 */
        .processing-glow { animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="pb-80">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6 text-white text-center">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-6 font-serif tracking-widest">MenuLens HK</h2>
            <input type="number" id="pwd-input" pattern="\d*" inputmode="numeric" placeholder="房間密碼" 
                   class="w-full bg-slate-100 rounded-3xl p-5 text-center font-black text-3xl mb-6 text-slate-800 tracking-widest outline-none border-4 border-transparent focus:border-orange-400">
            <button onclick="unlockApp()" class="w-full bg-orange-500 text-white py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">進入並加速</button>
        </div>
    </div>

    <div id="app-body" class="hidden">
        <header class="p-5 sticky top-0 bg-white z-40 border-b">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">Menu<span class="text-orange-500">Lens</span></h1>
                <div class="flex items-center space-x-3">
                    <button onclick="logout()" class="text-xs font-bold text-slate-400 underline">登出</button>
                    <label for="camera-direct" class="bg-purple-900 text-white p-3 rounded-2xl cursor-pointer shadow-lg active:scale-90 transition-transform">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </label>
                    <input type="file" id="camera-direct" accept="image/*" capture="environment" onchange="processImages(this)" class="hidden">

                    <label for="album-selection" class="bg-slate-800 text-white p-3 rounded-2xl cursor-pointer shadow-lg active:scale-90 transition-transform">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </label>
                    <input type="file" id="album-selection" accept="image/*" multiple onchange="processImages(this)" class="hidden">
                </div>
            </div>

            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-4" id="cat-nav">
                <button onclick="filterCat('all')" class="category-btn active px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">全部</button>
                <button onclick="filterCat('主菜')" class="category-btn px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">主菜</button>
                <button onclick="filterCat('飲料')" class="category-btn px-6 py-2 rounded-full text-xs font-black border-2 border-slate-100 whitespace-nowrap">飲料</button>
            </div>

            <div class="bg-blue-600 p-4 rounded-[2rem] text-white shadow-lg space-y-3">
                <div class="flex justify-between items-center">
                    <select id="local-ccy" onchange="updateCcy()" class="bg-blue-700 text-white font-bold p-2 rounded-xl outline-none">
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="KRW">🇰🇷 KRW</option>
                        <option value="EUR">🇪🇺 EUR</option>
                    </select>
                    <span class="opacity-50 text-xl">➜</span>
                    <select id="home-ccy" onchange="updateCcy()" class="bg-blue-700 text-white font-bold p-2 rounded-xl outline-none text-right">
                        <option value="HKD">🇭🇰 HKD</option>
                        <option value="TWD">🇹🇼 TWD</option>
                    </select>
                </div>
                <div class="pt-2 border-t border-blue-500/50 flex justify-between items-center font-mono text-xs">
                    <span>1 <span class="l-code">JPY</span> = </span>
                    <div class="flex items-center space-x-2">
                        <input type="number" id="rate-display" step="0.0001" onchange="manualRate(this.value)" class="bg-blue-800 text-right px-2 rounded w-24 outline-none border-none text-blue-200">
                        <span class="h-code opacity-70 font-bold uppercase">HKD</span>
                    </div>
                </div>
            </div>
        </header>

        <main id="item-list" class="p-6 grid gap-6 pb-20"></main>

        <div class="sticky-footer p-8 bg-white">
            <div id="progress-container" class="hidden mb-4">
                <div class="flex justify-between text-[10px] font-black text-purple-700 mb-1 uppercase tracking-tighter">
                    <span id="p-status" class="processing-glow">⚡ 極速引擎運行中...</span>
                    <span id="p-count">0/0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1 overflow-hidden">
                    <div id="loading-bar" class="h-full bg-purple-600 w-0 transition-all duration-300"></div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div>
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Bill</span>
                    <div class="flex items-baseline space-x-2 leading-none">
                        <span class="text-3xl font-black text-slate-900"><span class="l-sym">¥</span><span id="total-local">0</span></span>
                        <span class="text-sm font-bold text-orange-500">≈ <span class="h-sym">HK$</span><span id="total-home">0</span></span>
                    </div>
                </div>
                <button onclick="showCheckout()" class="bg-orange-500 text-white px-10 py-5 rounded-[1.8rem] font-black text-xl shadow-xl shadow-orange-100 active:scale-95 transition-all">
                    CHECKOUT
                </button>
            </div>
            
            <div class="flex justify-between items-center px-2 border-t pt-4">
                <div class="flex items-center space-x-2">
                    <input type="checkbox" id="svc-fee" onchange="toggleSvc()" class="w-4 h-4 rounded accent-orange-500">
                    <label for="svc-fee" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">+10% 加一服務費</label>
                </div>
                <button onclick="clearAll()" class="text-[11px] font-bold text-red-400 uppercase tracking-widest underline">Clear All</button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="hidden fixed inset-0 bg-slate-900/95 z-[100] flex items-center justify-center p-6" onclick="closeCheckout()">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black text-slate-800 mb-6 border-b pb-4">訂單明細</h2>
            <div id="checkout-list" class="space-y-4 mb-6 max-h-[40vh] overflow-y-auto"></div>
            <div class="text-right border-t pt-6">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">Final Amount</p>
                <p class="text-4xl font-black text-orange-600 italic"><span class="l-sym">¥</span><span id="checkout-total">0</span></p>
            </div>
            <button onclick="closeCheckout()" class="w-full mt-10 bg-slate-900 text-white py-5 rounded-3xl font-black text-lg">返回</button>
        </div>
    </div>

    <script>
        let gun, room, worker;
        const symMap = { 'JPY':'¥', 'KRW':'₩', 'EUR':'€', 'HKD':'HK$', 'TWD':'NT$' };
        let state = { local: 'JPY', home: 'HKD', rate: 0.051, useSvc: false, items: [], currentCat: 'all' };

        // 🌟 初始化極速 OCR 引擎 (常駐背景)
        async function initFastWorker() {
            if (worker) return;
            worker = await Tesseract.createWorker({
                logger: m => { if (m.status === 'recognizing text') updateProgress(m.progress); }
            });
            await worker.loadLanguage('jpn+eng');
            await worker.initialize('jpn+eng');
            // 💡 效能關鍵：設定白名單，只辨識價格與常用字符，極大提升速度
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789.,¥$ぁあぃいぅうぇえぉおかがきぎくぐけげこごさざしじすずせぜそぞただちぢっつづてでとどなにぬねのはばぱひびぴふぶぷへべぺほぼぽまみむめもゃやゅゆょよらりるれろゎわゐゑをんァアィイゥウェエォオカガキギクグケGEKO'
            });
        }

        function unlockApp() {
            const pwd = document.getElementById('pwd-input').value;
            if (!pwd) return;
            const roomId = 'room-hk-fast-v1-' + btoa(pwd).substring(0, 10);
            gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
            room = gun.get(roomId);
            room.on(d => { if(d && d.c) { state = JSON.parse(d.c); render(false); } });
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            sessionStorage.setItem('ml_last_pwd', pwd);
            initFastWorker(); // 登入後立即啟動引擎
        }

        if(sessionStorage.getItem('ml_last_pwd')) {
            document.getElementById('pwd-input').value = sessionStorage.getItem('ml_last_pwd');
            unlockApp();
        }

        async function translate(text) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURI(text)}`);
                const data = await res.json();
                return data[0][0][0];
            } catch (e) { return text; }
        }

        async function processImages(input) {
            if (!input.files || input.files.length === 0) return;
            await initFastWorker(); // 確保引擎已就緒
            
            const pContainer = document.getElementById('progress-container');
            const pCount = document.getElementById('p-count');
            pContainer.classList.remove('hidden');
            
            const files = Array.from(input.files);
            for (let i = 0; i < files.length; i++) {
                pCount.innerText = `${i+1} / ${files.length}`;
                const { data: { lines } } = await worker.recognize(files[i]);
                
                for (let l of lines) {
                    const m = l.text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
                    if (m) {
                        const price = parseFloat(m[1].replace(/,/g, ''));
                        const raw = l.text.replace(m[0],'').trim();
                        if (price > 10) {
                            const trans = await translate(raw);
                            state.items.push({ 
                                id: Date.now() + Math.random(), 
                                name: trans, raw: raw, price, qty: 1, picked: false, 
                                category: raw.includes('飲') ? '飲料' : '主菜'
                            });
                        }
                    }
                }
                render(true);
            }
            pContainer.classList.add('hidden');
            input.value = ""; 
        }

        function updateProgress(p) {
            document.getElementById('loading-bar').style.width = Math.floor(p * 100) + '%';
        }

        function render(isLocal = true) {
            document.getElementById('local-ccy').value = state.local;
            document.getElementById('home-ccy').value = state.home;
            document.querySelectorAll('.l-code').forEach(el => el.innerText = state.local);
            document.querySelectorAll('.h-code').forEach(el => el.innerText = state.home);
            document.querySelectorAll('.l-sym').forEach(el => el.innerText = symMap[state.local]);
            document.querySelectorAll('.h-sym').forEach(el => el.innerText = symMap[state.home]);
            document.getElementById('rate-display').value = state.rate;

            const list = document.getElementById('item-list');
            const filtered = state.currentCat === 'all' ? state.items : state.items.filter(i => i.category === state.currentCat);
            
            list.innerHTML = filtered.map(item => `
                <div class="food-card p-6 rounded-[2.5rem] relative ${item.picked ? 'shadow-xl' : 'unpicked'}" onclick="toggle(${item.id})">
                    <span class="edit-hint">修改名稱</span>
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-6">
                            <h3 class="text-xl font-black text-slate-800 leading-tight mb-1" onclick="editName(${item.id}, '${item.name}')">${item.name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold mb-3 uppercase">${item.raw}</p>
                            <div class="flex items-baseline space-x-2">
                                <span class="text-2xl font-black text-slate-900">${symMap[state.local]}${item.price.toLocaleString()}</span>
                                <span class="text-[10px] font-black text-orange-600 uppercase">≈ ${symMap[state.home]}${Math.round(item.price * state.rate)}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center space-y-4" onclick="event.stopPropagation()">
                            <button onclick="updQty(${item.id}, 1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">+</button>
                            <span class="text-lg font-black text-slate-800">${item.qty}</span>
                            <button onclick="updQty(${item.id}, -1)" class="w-10 h-10 bg-white border-2 border-orange-100 rounded-2xl flex items-center justify-center text-orange-500 font-black text-xl">-</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const sel = state.items.filter(i => i.picked);
            let lSum = sel.reduce((s, i) => s + (i.price * i.qty), 0);
            if(state.useSvc) lSum *= 1.1;
            document.getElementById('total-local').innerText = Math.round(lSum).toLocaleString();
            document.getElementById('total-home').innerText = Math.round(lSum * state.rate).toLocaleString();
            if (isLocal && room) room.put({ c: JSON.stringify(state) });
        }

        async function fetchCcyRate() {
            const res = await fetch(`https://open.er-api.com/v6/latest/${state.local}`);
            const data = await res.json();
            state.rate = data.rates[state.home].toFixed(5);
            render(true);
        }

        function updateCcy() {
            state.local = document.getElementById('local-ccy').value;
            state.home = document.getElementById('home-ccy').value;
            fetchCcyRate();
        }

        function filterCat(cat) { state.currentCat = cat; render(false); }
        function toggle(id) { const i = state.items.find(x => x.id === id); i.picked = !i.picked; render(true); }
        function updQty(id, d) { event.stopPropagation(); const i = state.items.find(x => x.id === id); i.qty = Math.max(1, i.qty + d); render(true); }
        function manualRate(v) { state.rate = parseFloat(v); render(true); }
        function toggleSvc() { state.useSvc = document.getElementById('svc-fee').checked; render(true); }
        function clearAll() { if(confirm("清空？")) { state.items = []; render(true); } }
        function editName(id, current) { event.stopPropagation(); const n = prompt("名稱：", current); if(n) { state.items.find(x=>x.id===id).name = n; render(true); } }
        function showCheckout() {
            const sel = state.items.filter(i => i.picked);
            if(!sel.length) return alert("尚未挑選");
            document.getElementById('checkout-list').innerHTML = sel.map(i => `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl mb-2"><p class="font-black text-slate-800 text-sm">${i.name} x ${i.qty}</p><p class="font-black text-slate-900">${symMap[state.local]}${(i.price * i.qty).toLocaleString()}</p></div>`).join('');
            let total = sel.reduce((s, i) => s + (i.price * i.qty), 0) * (state.useSvc ? 1.1 : 1);
            document.getElementById('checkout-total').innerText = Math.round(total).toLocaleString();
            document.getElementById('checkout-modal').classList.remove('hidden');
        }
        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }
        function logout() { sessionStorage.removeItem('ml_last_pwd'); location.reload(); }
    </script>
</body>
</html>
