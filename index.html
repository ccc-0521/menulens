<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuLens - 密碼加密版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        .sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 50; }
        #camera-input { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="bg-slate-50 pb-64">

    <div id="auth-screen">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">私密點餐空間</h2>
            <p class="text-slate-400 text-sm mb-6">請輸入密碼以解鎖您的專屬清單</p>
            <input type="number" id="pwd-input" pattern="\d*" placeholder="請輸入 4 位數密碼" 
                   class="w-full bg-slate-100 border-none rounded-2xl p-4 text-center font-bold text-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 tracking-widest">
            <button onclick="unlockApp()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">解鎖並進入</button>
            <p class="text-[10px] text-slate-300 mt-6">提示：不同密碼將進入不同房間</p>
        </div>
    </div>

    <div id="app-body" class="hidden">
        <header class="bg-white p-5 sticky top-0 z-40 border-b border-slate-100 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter">Menu<span class="text-blue-600">Lens</span></h1>
                <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-bold">已加密連線</span>
            </div>

            <div class="bg-slate-900 p-4 rounded-3xl text-white space-y-3">
                <div class="flex justify-between items-center">
                    <select id="local-ccy" onchange="updateConfig()" class="bg-slate-800 text-white font-bold p-2 rounded-xl outline-none">
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="KRW">🇰🇷 KRW</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                    <span class="text-slate-500">➜</span>
                    <select id="home-ccy" onchange="updateConfig()" class="bg-slate-800 text-white font-bold p-2 rounded-xl outline-none">
                        <option value="TWD">🇹🇼 TWD</option>
                        <option value="HKD">🇭🇰 HKD</option>
                        <option value="USD">🇺🇸 USD</option>
                    </select>
                </div>
                <div class="flex justify-between items-center border-t border-slate-700 pt-2 px-1">
                    <span class="text-[10px] text-slate-400">當前匯率:</span>
                    <input type="number" id="rate-display" step="0.0001" onchange="manualRate(this.value)" class="bg-transparent text-right font-mono text-blue-400 font-bold outline-none">
                </div>
            </div>
        </header>

        <main id="item-list" class="p-4 space-y-3"></main>

        <div class="sticky-bottom p-5 border-t border-slate-100">
            <label for="camera-input" class="w-full bg-blue-600 text-white py-4 rounded-2xl flex items-center justify-center shadow-xl active:scale-95 transition-all mb-4 cursor-pointer">
                <span class="font-bold text-lg">📸 掃描菜單價格</span>
            </label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="processImage(this)">

            <div class="bg-white border-2 border-slate-900 p-5 rounded-[2rem] flex justify-between items-end">
                <div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase local-code">Local</span>
                    <p class="text-xl font-bold font-mono" id="total-local">0</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold text-blue-600 uppercase home-code">Home</span>
                    <p class="text-3xl font-black font-mono text-blue-600" id="total-home">0</p>
                </div>
            </div>
            
            <div class="flex justify-between mt-4 px-2">
                <button onclick="showShare()" class="text-xs font-bold text-slate-400 underline">邀請夥伴</button>
                <button onclick="clearAll()" class="text-xs font-bold text-red-400">清空重啟</button>
            </div>
        </div>
    </div>

    <div id="scan-overlay" class="hidden fixed inset-0 bg-black/80 z-[100] flex flex-col items-center justify-center text-white">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p>AI 正在算錢中...</p>
    </div>

    <script>
        let gun, room;
        let state = { localCcy: 'JPY', homeCcy: 'TWD', rate: 0.21, items: [] };

        // --- 核心：解鎖功能 ---
        function unlockApp() {
            const pwd = document.getElementById('pwd-input').value;
            if (pwd.length < 4) {
                alert("請輸入至少 4 位數密碼");
                return;
            }

            // 使用密碼生成獨一無二的房間 ID
            const secretRoomId = 'mlens-' + btoa(pwd).substring(0, 8);
            initGun(secretRoomId);

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-body').classList.remove('hidden');
            sessionStorage.setItem('lastPwd', pwd);
        }

        // --- 進入時自動檢查 Session ---
        window.onload = () => {
            const savedPwd = sessionStorage.getItem('lastPwd');
            if(savedPwd) {
                document.getElementById('pwd-input').value = savedPwd;
                unlockApp();
            }
        };

        function initGun(roomId) {
            gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
            room = gun.get(roomId);
            room.on(d => { if(d && d.c) { state = JSON.parse(d.c); render(false); } });
        }

        async function autoFetch() {
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${state.localCcy}`);
                const data = await res.json();
                state.rate = data.rates[state.homeCcy].toFixed(5);
                render(true);
            } catch (e) { console.log("Fetch failed"); }
        }

        function updateConfig() {
            state.localCcy = document.getElementById('local-ccy').value;
            state.homeCcy = document.getElementById('home-ccy').value;
            autoFetch();
        }

        function manualRate(v) { state.rate = parseFloat(v); render(true); }

        async function processImage(input) {
            if (!input.files[0]) return;
            document.getElementById('scan-overlay').classList.remove('hidden');
            try {
                const worker = await Tesseract.createWorker('jpn+eng');
                const { data: { lines } } = await worker.recognize(input.files[0]);
                lines.forEach(l => {
                    const m = l.text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d+)?)/);
                    if (m) {
                        const price = parseFloat(m[1].replace(/,/g, ''));
                        if (price > 1) state.items.push({ id: Date.now()+Math.random(), name: l.text.replace(m[0],'').trim().slice(0,10)||"項目", price, qty:1, picked:true });
                    }
                });
                await worker.terminate();
                render(true);
            } finally { document.getElementById('scan-overlay').classList.add('hidden'); }
        }

        function render(isLocal = true) {
            document.getElementById('local-ccy').value = state.localCcy;
            document.getElementById('home-ccy').value = state.homeCcy;
            document.getElementById('rate-display').value = state.rate;

            const list = document.getElementById('item-list');
            list.innerHTML = state.items.map(item => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-2 ${item.picked ? 'border-blue-500' : 'border-transparent'}">
                    <div onclick="toggle(${item.id})" class="flex-1">
                        <h3 class="font-bold text-slate-800">${item.name}</h3>
                        <p class="text-xs text-slate-400 font-mono">${state.localCcy} ${item.price} ≈ ${state.homeCcy} ${Math.round(item.price * state.rate)}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="updQty(${item.id},-1)" class="w-8 h-8 bg-slate-100 rounded-lg">-</button>
                        <span class="font-bold text-sm">${item.qty}</span>
                        <button onclick="updQty(${item.id},1)" class="w-8 h-8 bg-slate-100 rounded-lg">+</button>
                    </div>
                </div>
            `).join('');

            const sel = state.items.filter(i => i.picked);
            let lSum = sel.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-local').innerText = Math.round(lSum).toLocaleString();
            document.getElementById('total-home').innerText = Math.round(lSum * state.rate).toLocaleString();

            if(isLocal && room) room.put({ c: JSON.stringify(state) });
        }

        function toggle(id) { const i = state.items.find(x=>x.id===id); i.picked = !i.picked; render(true); }
        function updQty(id, d) { const i = state.items.find(x=>x.id===id); i.qty = Math.max(1, i.qty+d); render(true); }
        function clearAll() { if(confirm("清空？")) { state.items = []; render(true); } }
        function showShare() { alert("請讓夥伴在進入網頁時，輸入與您相同的密碼即可同步。"); }
    </script>
</body>
</html>
